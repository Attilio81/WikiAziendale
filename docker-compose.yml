services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      DATABASE_URL: sqlite:////data/llm_wiki.db
      API_KEY: dev-change-me
      API_CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_API_KEY: dev-change-me
    depends_on:
      backend:
        condition: service_healthy
